@if (visible()) { <div class="panel-backdrop" (click)="cerrar()"></div> }
<div class="side-panel" [class.open]="visible()">
  <div class="panel-header">
    <div class="panel-title-wrap">
      <div class="panel-icon"><i class="pi pi-credit-card"></i></div>
      <div><h2 class="panel-title">Nuevo Préstamo</h2><p class="panel-sub">Solicitud de préstamo para empleado</p></div>
    </div>
    <button class="close-btn" (click)="cerrar()"><i class="pi pi-times"></i></button>
  </div>
  <div class="panel-body">
    @if (error()) { <div class="panel-error"><i class="pi pi-exclamation-circle"></i><span>{{ error() }}</span></div> }
    <form [formGroup]="form" class="panel-form">
      <div class="form-section">
        <div class="section-label"><i class="pi pi-user"></i> Empleado</div>
        <div class="field">
          <label>ID Empleado <span class="req">*</span></label>
          <input pInputText type="number" formControlName="empleadoId" placeholder="ID del empleado" />
          @if (invalid('empleadoId')) { <small class="err">Requerido</small> }
        </div>
      </div>
      <div class="form-section">
        <div class="section-label"><i class="pi pi-dollar"></i> Préstamo</div>
        <div class="form-row">
          <div class="field">
            <label>Tipo <span class="req">*</span></label>
            <p-select formControlName="tipo" [options]="tipoOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
          </div>
          <div class="field">
            <label>Monto solicitado <span class="req">*</span></label>
            <input pInputText type="number" formControlName="montoSolicitado" min="1" step="0.01" />
            @if (invalid('montoSolicitado')) { <small class="err">Requerido</small> }
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Número de cuotas <span class="req">*</span></label>
            <input pInputText type="number" formControlName="numeroCuotas" min="1" />
          </div>
          <div class="field">
            <label>Fecha solicitud <span class="req">*</span></label>
            <input pInputText type="date" formControlName="fechaSolicitud" />
          </div>
        </div>
        <div class="field">
          <label>Motivo</label>
          <input pInputText formControlName="motivo" placeholder="Motivo del préstamo" />
        </div>
      </div>
    </form>
  </div>
  <div class="panel-footer">
    <p-button label="Cancelar" severity="secondary" [outlined]="true" [disabled]="guardando()" (onClick)="cerrar()" styleClass="flex-1" />
    <p-button label="Registrar préstamo" icon="pi pi-plus" [loading]="guardando()" (onClick)="guardar()" styleClass="flex-1" />
  </div>
</div>
