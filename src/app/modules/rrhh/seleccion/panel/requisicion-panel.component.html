@if (visible()) { <div class="panel-backdrop" (click)="cerrar()"></div> }
<div class="side-panel" [class.open]="visible()">
  <div class="panel-header">
    <div class="panel-title-wrap">
      <div class="panel-icon"><i class="pi pi-file-edit"></i></div>
      <div><h2 class="panel-title">Nueva Requisición</h2><p class="panel-sub">Solicitud de personal</p></div>
    </div>
    <button class="close-btn" (click)="cerrar()"><i class="pi pi-times"></i></button>
  </div>
  <div class="panel-body">
    @if (error()) { <div class="panel-error"><i class="pi pi-exclamation-circle"></i><span>{{ error() }}</span></div> }
    <form [formGroup]="form" class="panel-form">
      <div class="form-section">
        <div class="section-label"><i class="pi pi-sitemap"></i> Organización</div>
        <div class="form-row">
          <div class="field">
            <label>ID Departamento <span class="req">*</span></label>
            <input pInputText type="number" formControlName="departamentoId" />
            @if (invalid('departamentoId')) { <small class="err">Requerido</small> }
          </div>
          <div class="field">
            <label>ID Puesto <span class="req">*</span></label>
            <input pInputText type="number" formControlName="puestoId" />
            @if (invalid('puestoId')) { <small class="err">Requerido</small> }
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Motivo <span class="req">*</span></label>
            <p-select formControlName="motivo" [options]="motivoOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
          </div>
          <div class="field">
            <label>Cantidad plazas <span class="req">*</span></label>
            <input pInputText type="number" formControlName="cantidadPlazas" min="1" />
          </div>
        </div>
        <div class="field">
          <label>ID Solicitante <span class="req">*</span></label>
          <input pInputText type="number" formControlName="solicitanteId" />
          @if (invalid('solicitanteId')) { <small class="err">Requerido</small> }
        </div>
      </div>
      <div class="form-section">
        <div class="section-label"><i class="pi pi-calendar"></i> Fechas</div>
        <div class="form-row">
          <div class="field">
            <label>Fecha solicitud <span class="req">*</span></label>
            <input pInputText type="date" formControlName="fechaSolicitud" />
          </div>
          <div class="field">
            <label>Fecha requerida</label>
            <input pInputText type="date" formControlName="fechaRequerida" />
          </div>
        </div>
        <div class="field">
          <label>Descripción del perfil</label>
          <input pInputText formControlName="descripcionPerfil" placeholder="Perfil buscado..." />
        </div>
      </div>
    </form>
  </div>
  <div class="panel-footer">
    <p-button label="Cancelar" severity="secondary" [outlined]="true" [disabled]="guardando()" (onClick)="cerrar()" styleClass="flex-1" />
    <p-button label="Crear requisición" icon="pi pi-plus" [loading]="guardando()" (onClick)="guardar()" styleClass="flex-1" />
  </div>
</div>
